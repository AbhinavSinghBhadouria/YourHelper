<svg width="800" height="900" viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="900" fill="#0f172a" rx="20"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">AI Failover Strategy – State Diagram</text>

  <!-- Legend Box -->
  <rect x="30" y="650" width="220" height="220" fill="#1e293b" stroke="#334155" stroke-width="2" rx="10"/>
  <text x="45" y="685" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f8fafc">Legend</text>
  
  <circle cx="55" cy="715" r="8" fill="#f8fafc"/>
  <text x="75" y="720" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Start</text>
  
  <line x1="45" y1="750" x2="65" y2="750" stroke="#22c55e" stroke-width="3"/>
  <text x="75" y="755" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Success (200)</text>
  
  <line x1="45" y1="785" x2="65" y2="785" stroke="#ef4444" stroke-width="3"/>
  <text x="75" y="790" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Rate Limit (429)</text>
  
  <line x1="45" y1="820" x2="65" y2="820" stroke="#8b5cf6" stroke-width="3"/>
  <text x="75" y="825" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Retry Flow</text>

  <!-- States -->
  
  <!-- Start Circle -->
  <circle cx="100" cy="130" r="12" fill="#f8fafc"/>
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Start</text>
  
  <!-- IDLE State -->
  <rect x="300" y="100" width="200" height="100" fill="#f0fdf4" stroke="#22c55e" stroke-width="3" rx="15"/>
  <text x="400" y="155" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#14532d" text-anchor="middle">Idle</text>
  <path d="M400 115 v15 M392 122 a10 10 0 1 0 16 0" fill="none" stroke="#14532d" stroke-width="3" stroke-linecap="round"/>

  <!-- Random Key Selection -->
  <rect x="300" y="280" width="200" height="100" fill="#eff6ff" stroke="#3b82f6" stroke-width="3" rx="15"/>
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Random Key</text>
  <text x="400" y="355" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Selection</text>

  <!-- Attempt API Call -->
  <rect x="300" y="460" width="200" height="120" fill="#fffbeb" stroke="#f59e0b" stroke-width="3" rx="15"/>
  <text x="400" y="520" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#78350f" text-anchor="middle">Attempt</text>
  <text x="400" y="545" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#78350f" text-anchor="middle">API Call</text>

  <!-- Key Rotation -->
  <rect x="580" y="470" width="180" height="100" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3" rx="15"/>
  <text x="670" y="525" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4c1d95" text-anchor="middle">Key Rotation</text>

  <!-- Return PDF -->
  <rect x="40" y="470" width="180" height="100" fill="#f0fdf4" stroke="#22c55e" stroke-width="3" rx="15"/>
  <text x="130" y="525" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#14532d" text-anchor="middle">Return PDF</text>

  <!-- Redirect to Error -->
  <rect x="300" y="700" width="200" height="100" fill="#fef2f2" stroke="#ef4444" stroke-width="3" rx="15"/>
  <text x="400" y="745" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7f1d1d" text-anchor="middle">Redirect to</text>
  <text x="400" y="770" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7f1d1d" text-anchor="middle">Error Page</text>

  <!-- Dashboard -->
  <rect x="600" y="700" width="160" height="100" fill="#fffbeb" stroke="#f59e0b" stroke-width="3" rx="15"/>
  <text x="680" y="755" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#78350f" text-anchor="middle">Dashboard</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
    </marker>
  </defs>

  <!-- Connectors -->
  <line x1="115" y1="130" x2="290" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  
  <line x1="400" y1="205" x2="400" y2="270" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="235" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Request Received</text>

  <line x1="400" y1="385" x2="400" y2="450" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Success Path -->
  <line x1="295" y1="520" x2="230" y2="520" stroke="#22c55e" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="240" y="510" font-family="Arial, sans-serif" font-size="14" fill="#22c55e" font-weight="bold">Success (200)</text>
  
  <path d="M130 465 Q130 130 290 130" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Rate Limit Path -->
  <line x1="505" y1="520" x2="570" y2="520" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="515" y="510" font-family="Arial, sans-serif" font-size="14" fill="#ef4444" font-weight="bold">Rate Limit (429)</text>

  <!-- Retry Flow -->
  <path d="M670 465 Q670 410 400 450" fill="none" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <text x="550" y="420" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" font-weight="bold">Retry Flow</text>

  <path d="M670 575 L670 150 L505 150" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Exhausted Path -->
  <line x1="400" y1="585" x2="400" y2="690" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="320" y="640" font-family="Arial, sans-serif" font-size="14" fill="#ef4444" font-weight="bold">ALL Keys Exhausted</text>

  <!-- After 4 Seconds -->
  <line x1="505" y1="750" x2="590" y2="750" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="515" y="740" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">After 4 Seconds</text>

</svg>
